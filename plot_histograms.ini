import numpy as np
import matplotlib.pyplot as plt
import tifffile
 
# ── Configure these two paths ─────────────────────────────────────────────
CLEAN_PATH  = "clean_vol_Beef_Patties_no_STD.tiff"
SEEDED_PATH = "clean_vol_Beef_Patties_w_STD.tiff"
# ─────────────────────────────────────────────────────────────────────────

BINS = 1024

def load_histogram(path, bins=BINS):
    print(f"Loading {path} ...")
    data = tifffile.imread(path)
    counts, edges = np.histogram(data.ravel(), bins=bins)
    print(f"  shape: {data.shape}  dtype: {data.dtype}  range: [{data.min()}, {data.max()}]")
    return counts, edges

